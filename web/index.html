<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>multiws</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --panel: #fffdf8;
        --ink: #1f2128;
        --accent: #0e7a6a;
        --muted: #6c706f;
        --line: #d8d2c7;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top right, #dfefe4 0%, var(--bg) 40%, #efe9de 100%);
      }
      .app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      .topbar {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
      }
      input, button {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        padding: 8px 10px;
        border-radius: 10px;
      }
      button {
        cursor: pointer;
        background: var(--accent);
        color: white;
        border-color: #0a6356;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }
      .tile {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        cursor: pointer;
      }
      .tile.active {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px #0e7a6a22;
      }
      .tile .path {
        color: var(--muted);
        font-size: 12px;
        word-break: break-all;
      }
      .cols {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 12px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        min-height: 240px;
      }
      .files button {
        width: 100%;
        text-align: left;
        margin-bottom: 6px;
        background: #fff;
        color: var(--ink);
        border-color: var(--line);
      }
      pre {
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <input id="path" style="flex:1" placeholder="/absolute/path/to/workspace" />
        <button id="add">Add Workspace</button>
      </div>
      <div id="grid" class="grid"></div>
      <div class="cols">
        <div class="panel files">
          <h3 id="files-title">Changed Files</h3>
          <div id="files"></div>
        </div>
        <div class="panel">
          <h3 id="diff-title">Diff</h3>
          <pre id="diff"></pre>
        </div>
      </div>
      <div class="panel" style="margin-top:12px;">
        <h3>Terminal</h3>
        <div style="display:flex; gap:8px; margin-bottom:8px;">
          <button id="agent-start">Start Agent</button>
          <button id="agent-stop">Stop Agent</button>
          <button id="shell-start">Start Shell</button>
          <button id="shell-stop">Stop Shell</button>
          <select id="term-kind">
            <option value="Shell">Shell</option>
            <option value="Agent">Agent</option>
          </select>
        </div>
        <input id="term-input" placeholder="Type command and press Enter to send to selected terminal" style="width:100%; margin-bottom:8px;" />
        <pre id="term-output" style="max-height:260px; overflow:auto;"></pre>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
